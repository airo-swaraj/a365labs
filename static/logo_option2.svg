<!-- OPTION 2: Cloud with Building & 365 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Cloud background -->
  <ellipse cx="100" cy="85" rx="65" ry="50" fill="url(#grad2)" opacity="0.15" filter="url(#shadow2)"/>
  
  <!-- Building tower -->
  <rect x="80" y="65" width="40" height="75" rx="4" fill="url(#grad2)" filter="url(#shadow2)"/>
  
  <!-- Building windows (3x3 grid) -->
  <rect x="85" y="72" width="8" height="8" fill="white" opacity="0.85"/>
  <rect x="96" y="72" width="8" height="8" fill="white" opacity="0.85"/>
  <rect x="107" y="72" width="8" height="8" fill="white" opacity="0.85"/>
  
  <rect x="85" y="85" width="8" height="8" fill="white" opacity="0.7"/>
  <rect x="96" y="85" width="8" height="8" fill="white" opacity="0.85"/>
  <rect x="107" y="85" width="8" height="8" fill="white" opacity="0.7"/>
  
  <rect x="85" y="98" width="8" height="8" fill="white" opacity="0.8"/>
  <rect x="96" y="98" width="8" height="8" fill="white" opacity="0.85"/>
  <rect x="107" y="98" width="8" height="8" fill="white" opacity="0.8"/>
  
  <!-- Roof on building -->
  <polygon points="80,65 100,45 120,65" fill="url(#grad2)" filter="url(#shadow2)"/>
  
  <!-- 365 text in modern style -->
  <text x="100" y="160" font-family="'Arial', sans-serif" font-size="32" font-weight="800" fill="url(#grad2)" text-anchor="middle" letter-spacing="1">365</text>
</svg>
