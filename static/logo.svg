<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradients and Filters -->
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Circular Bloom Logo - Top Center -->
  <g transform="translate(200, 50)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#0066ff" stroke-width="2" opacity="0.15"/>
    
    <!-- Main circle -->
    <circle cx="0" cy="0" r="40" fill="url(#circleGradient)" filter="url(#shadow)"/>
    
    <!-- Petal/Bloom segments -->
    <g fill="#ffffff" opacity="0.88">
      <!-- Petal 1 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.92" transform="rotate(0)"/>
      <!-- Petal 2 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.88" transform="rotate(60)"/>
      <!-- Petal 3 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.84" transform="rotate(120)"/>
      <!-- Petal 4 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.84" transform="rotate(180)"/>
      <!-- Petal 5 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.88" transform="rotate(240)"/>
      <!-- Petal 6 -->
      <ellipse cx="0" cy="-30" rx="8" ry="16" fill="#ffffff" opacity="0.92" transform="rotate(300)"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.96"/>
  </g>
  
  <!-- Main Branding Text - Center Below Logo -->
  <g transform="translate(200, 140)">
    <!-- A365LABS Text - Centered -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="#001a4d" text-anchor="middle">
      <tspan>A365</tspan><tspan fill="#0066ff" font-weight="900">LABS</tspan>
    </text>
    
    <!-- Accent Line - Centered -->
    <line x1="-110" y1="18" x2="110" y2="18" stroke="#0066ff" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Tagline - Centered -->
    <text x="0" y="50" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#0066ff" text-anchor="middle" letter-spacing="0.8" opacity="0.8">
      FROM OFFICE TO OS, WE'VE GOT YOU COVERED.
    </text>
  </g>
</svg>
